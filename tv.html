<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco TV | Mediathek</title>
    <style>
        /* Gleiches Basis-Design wie oben */
        :root { --bg: #0a0a0a; --card-bg: #121212; --accent: #d64545; --text: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; border-bottom: 1px solid #222; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: #666; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .nav-links a.active { color: #fff; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* LIVE TV PLACEHOLDER */
        .live-player-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(45deg, #000 30%, #111 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
            margin-bottom: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .play-btn {
            width: 80px; height: 80px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin-bottom: 20px; cursor: pointer; transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.1); background: #fff; color: #000; }

        /* MEDIATHEK GRID */
        .mediathek-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .show-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #222;
        }
        .show-card:hover { border-color: #555; }

        .show-thumb { height: 150px; background: #222; display: flex; align-items: center; justify-content: center; color: #444; font-weight: bold; }
        .show-info { padding: 15px; }
        .show-info h4 { margin: 0; font-size: 16px; }
        .show-info p { margin: 5px 0 0; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-box"><img src="Logo.png" alt="EcoStudios" style="height:40px;"></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="https://ecostudiosbroadcasting.github.io/NFFM-Radio/">Radio</a>
        <a href="tv.html" class="active">TV</a>
        <a href="filme.html">Studios</a>
    </div>
</div>

<div class="container">
    <h1 style="font-size: 32px; margin-bottom: 30px;">Eco TV <span style="color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 14px; vertical-align: middle; margin-left: 10px;">LIVE</span></h1>
    
    <div class="live-player-placeholder">
        <div class="play-btn">▶</div>
        <p style="font-weight: bold; letter-spacing: 1px;">LIVE-STREAM STARTEN</p>
        <p style="color: #666; font-size: 14px;">Aktuell: Eco News - Das Wichtigste vom Tage</p>
    </div>

    <h2 style="font-size: 24px; margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 15px;">Eco Mediathek</h2>
    
    <div class="mediathek-grid">
        <div class="show-card">
            <div class="show-thumb">Eco News</div>
            <div class="show-info"><h4>Eco News kompakt</h4><p>Vor 2 Stunden</p></div>
        </div>
        <div class="show-card">
            <div class="show-thumb">Doku</div>
            <div class="show-info"><h4>Unsere Studios</h4><p>Gestern</p></div>
        </div>
        <div class="show-card">
            <div class="show-thumb">Entertainment</div>
            <div class="show-info"><h4>Late Night Show</h4><p>Vor 3 Tagen</p></div>
        </div>
        <div class="show-card">
            <div class="show-thumb">Sport</div>
            <div class="show-info"><h4>Highlight Magazin</h4><p>Letzte Woche</p></div>
        </div>
    </div>
</div>

</body>
</html>
