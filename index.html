<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoStudios</title>

<style>
body { margin:0; font-family:Segoe UI, sans-serif; background:#000; color:#fff; }

/* NAVBAR */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 40px;
  background:#0a0a0a;
  border-bottom:1px solid #222;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  height:40px;
}

nav a {
  color:#fff;
  text-decoration:none;
  margin:0 15px;
  font-size:14px;
  opacity:0.8;
}

nav a:hover { opacity:1; }

/* HERO */
.hero {
  padding:40px;
}

.hero h1 { font-size:32px; }

/* GRID NEWS STYLE */
.grid {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:40px;
}

.main-card {
  position:relative;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.main-card img {
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.7;
}

.main-card .content {
  position:absolute;
  bottom:20px;
  left:20px;
}

.side-card {
  background:#111;
  padding:20px;
  border-radius:10px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:20px;
  padding:0 40px 40px;
}

.card {
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
}
