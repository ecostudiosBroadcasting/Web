<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>EcoStudios | Film Studio</title>
    <style>
        :root { --bg: #0a0a0a; --card-bg: #121212; --text: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; border-bottom: 1px solid #222; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: #666; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .nav-links a.active { color: #fff; }
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .poster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .poster { aspect-ratio: 2/3; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; transition: 0.3s; }
        .poster:hover { transform: scale(1.02); border-color: #fff; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-box"><img src="Logo.png" alt="EcoStudios" style="height:40px;"></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="https://ecostudiosbroadcasting.github.io/NFFM-Radio/">Radio</a>
        <a href="tv.html">TV</a>
        <a href="filme.html" class="active">Studios</a>
    </div>
</div>

<div class="container">
    <img src="Logo.png" alt="Eco Studio" style="height: 80px; margin-bottom: 20px;">
    <h1>EcoStudios Productions</h1>
    <p style="color: #666;">Visionäre Filme und erstklassige Werbeproduktionen.</p>

    <div class="poster-grid">
        <div class="poster">COMING SOON</div>
        <div class="poster">IN PRODUKTION</div>
        <div class="poster">ECO ORIGINALS</div>
    </div>
</div>

</body>
</html>
